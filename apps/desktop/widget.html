<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; border: none; outline: none; box-sizing: border-box; }
      html, body, #root {
        background: transparent !important;
        overflow: visible;
        width: 100%;
        height: 100%;
      }
    </style>
    <script>
      // On Windows, WebView2 doesn't support transparent backgrounds reliably.
      // Detect Windows and apply an opaque dark background instead.
      if (navigator.platform.toUpperCase().includes("WIN")) {
        document.documentElement.style.background = "#1a1a1a";
        document.documentElement.style.borderRadius = "17px";
        document.documentElement.style.overflow = "hidden";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/widget.tsx"></script>
  </body>
</html>
