<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; border: none; outline: none; box-sizing: border-box; }
      html, body, #root {
        background: transparent !important;
        overflow: visible;
        width: 100%;
        height: 100%;
      }
      :root {
        --yapper-accent: #ae3200;
        --yapper-accent-light: #ffdbd0;
        --yapper-accent-dark: #852400;
        --yapper-bg-lighter: #f8f9fa;
        --yapper-text-secondary: #474747;
        --yapper-border: #c6c6c6;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --yapper-accent: #ffb59e;
          --yapper-accent-light: #ffdbd0;
          --yapper-accent-dark: #ae3200;
          --yapper-bg-lighter: #191c1d;
          --yapper-text-secondary: #c6c6c6;
          --yapper-border: #474747;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/widget.tsx"></script>
  </body>
</html>
