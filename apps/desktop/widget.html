<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Widget</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; border: none; outline: none; box-sizing: border-box; }
      html, body, #root {
        background: transparent !important;
        overflow: visible;
        width: 100%;
        height: 100%;
      }
      :root {
        --claude-orange: #CC785C;
        --claude-orange-light: #E89B7D;
        --claude-orange-dark: #B85C3D;
        --claude-bg-lighter: #FAFAFA;
        --claude-text-secondary: #666666;
        --claude-border: #E5E5E5;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --claude-orange: #E89B7D;
          --claude-orange-light: #F5B299;
          --claude-orange-dark: #CC785C;
          --claude-bg-lighter: #2A2A2A;
          --claude-text-secondary: #A3A3A3;
          --claude-border: #333333;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/widget.tsx"></script>
  </body>
</html>
