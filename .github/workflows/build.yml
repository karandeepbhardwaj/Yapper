name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm --filter desktop build

      - name: Cargo check
        working-directory: apps/desktop/src-tauri
        run: cargo check --target ${{ matrix.target }}

      - name: Build Tauri app
        if: github.event_name == 'push'
        run: pnpm tauri build --target ${{ matrix.target }}

      - name: Upload artifacts (macOS)
        if: github.event_name == 'push' && startsWith(matrix.platform, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: yapper-${{ matrix.target }}
          path: apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Windows)
        if: github.event_name == 'push' && matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: yapper-${{ matrix.target }}
          path: |
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

  build-vsix:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build and package VSIX
        working-directory: extensions/vscode-bridge
        run: |
          npx tsc -p ./
          node esbuild.config.mjs
          npx vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: yapper-vsix
          path: extensions/vscode-bridge/*.vsix

  release:
    needs: [build, build-vsix]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded artifacts
        run: find . -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.vsix" \)

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            yapper-*/**/*.dmg
            yapper-*/**/*.msi
            yapper-*/**/*.exe
            yapper-*/**/*.vsix
          generate_release_notes: true
